<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي - منصة محمد ناصر التعليمية</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components/navbar.css">
    <link rel="stylesheet" href="../assets/css/components/buttons.css">
    <link rel="stylesheet" href="../assets/css/pages_style/profile.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <meta name="description" content="الملف الشخصي للطالب - تتبع التقدم وإدارة المهام والإنجازات">
    <meta name="keywords" content="ملف شخصي, طالب, تعلم, مهام, إنجازات">
    
    <!-- Auth Guard - Protect this page -->
    <script>
        // Hide content immediately before page loads
        (function() {
            const isAuthenticated = localStorage.getItem('currentUserEmail') && localStorage.getItem('currentUser');
            if (!isAuthenticated) {
                // Show modal message
                document.addEventListener('DOMContentLoaded', function() {
                    // Hide page content
                    document.body.innerHTML = '';
                    
                    // Create modal
                    const modal = document.createElement('div');
                    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;align-items:center;justify-content:center;z-index:99999;';
                    
                    const modalContent = document.createElement('div');
                    modalContent.style.cssText = 'background:rgba(30,41,59,0.95);backdrop-filter:blur(20px);border:2px solid rgba(59,130,246,0.5);border-radius:20px;padding:2.5rem;max-width:450px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:modalSlide 0.4s ease;';
                    
                    modalContent.innerHTML = `
                        <style>
                            @keyframes modalSlide {
                                from { opacity: 0; transform: scale(0.9) translateY(-20px); }
                                to { opacity: 1; transform: scale(1) translateY(0); }
                            }
                        </style>
                        <div style="font-size:4rem;margin-bottom:1rem;animation:pulse 2s ease-in-out infinite;">🔒</div>
                        <h2 style="color:#f1f5f9;font-size:1.8rem;margin-bottom:1rem;font-weight:700;">تسجيل الدخول مطلوب</h2>
                        <p style="color:#94a3b8;font-size:1.1rem;line-height:1.6;margin-bottom:2rem;">يجب عليك تسجيل الدخول أولاً للوصول إلى هذه الصفحة والاستمتاع بجميع المميزات</p>
                        <button onclick="window.location.href='/public/pages/login.html'" style="padding:1rem 2.5rem;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:1.1rem;font-weight:600;cursor:pointer;transition:all 0.3s ease;box-shadow:0 4px 15px rgba(59,130,246,0.4);" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 25px rgba(59,130,246,0.6)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 15px rgba(59,130,246,0.4)'">
                            تسجيل الدخول الآن
                        </button>
                    `;
                    
                    modal.appendChild(modalContent);
                    document.body.appendChild(modal);
                });
            }
        })();
    </script>
    <script src="../assets/js/auth-guard.js"></script>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Profile Header -->
            <section class="profile-header">
                <div class="profile-avatar">
                    <span id="userInitials">👤</span>
                </div>
                <div class="profile-info">
                    <h1 id="userName" class="profile-name"></h1>
                    <p id="userEmail" class="profile-email"></p>
                    <div class="profile-stats">
                        <div class="profile-stat">
                            <div class="stat-number" id="watchedVideos">0</div>
                            <div class="stat-label">فيديو مكتمل</div>
                        </div>
                        <div class="profile-stat">
                            <div class="stat-number" id="passedExams">0</div>
                            <div class="stat-label">امتحان مجتاز</div>
                        </div>
                        <div class="profile-stat">
                            <div class="stat-number" id="totalTodos">0</div>
                            <div class="stat-label">مهمة نشطة</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Progress Overview -->
            <section class="progress-overview">
                <h2 class="section-title">📈 نظرة عامة على التقدم</h2>
                <div class="progress-grid">
                    <div class="progress-card">
                        <div class="progress-header">
                            <h3>🎥 الفيديوهات</h3>
                            <span id="videoProgress" class="progress-percentage">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div id="videoProgressBar" class="progress-fill"></div>
                        </div>
                        <div class="progress-details">
                            <span><span id="completedVideos">0</span> من <span id="totalVideosCount">0</span> فيديو</span>
                        </div>
                    </div>
                    <div class="progress-card">
                        <div class="progress-header">
                            <h3>📝 الامتحانات</h3>
                            <span id="examProgress" class="progress-percentage">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div id="examProgressBar" class="progress-fill"></div>
                        </div>
                        <div class="progress-details">
                            <span><span id="completedExams">0</span> من <span id="totalExamsCount">0</span> امتحان</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Tabs Navigation -->
            <div class="tabs-container">
                <div class="tabs-nav">
                    <button class="tab-btn active" data-tab="todos">
                        <span>✅</span> قائمة المهام
                    </button>
                    <button class="tab-btn" data-tab="results">
                        <span>📊</span> نتائج الامتحانات
                    </button>
                    <button class="tab-btn" data-tab="achievements">
                        <span>🏆</span> الإنجازات
                    </button>
                </div>

                <!-- Todo List Tab -->
                <div id="todosTab" class="tab-content active">
                    <div class="todo-section">
                        <div class="todo-header">
                            <h2>✅ قائمة المهام الشخصية</h2>
                            <div class="todo-controls">
                                <div class="filter-buttons">
                                    <button class="filter-btn active" data-filter="all">الكل</button>
                                    <button class="filter-btn" data-filter="pending">معلقة</button>
                                    <button class="filter-btn" data-filter="completed">مكتملة</button>
                                </div>
                                <button id="addTodoBtn" class="btn-primary">
                                    <span>➕</span>
                                    إضافة مهمة جديدة
                                </button>
                            </div>
                        </div>
                        <div id="todoList" class="todo-list">
                            <!-- Todo items will be loaded here -->
                        </div>
                    </div>
                </div>

                <!-- Exam Results Tab -->
                <div id="resultsTab" class="tab-content">
                    <div class="results-section">
                        <h2>📊 نتائج الامتحانات</h2>
                        <div id="examResults" class="results-grid">
                            <!-- Exam results will be loaded here -->
                        </div>
                    </div>
                </div>

                <!-- Achievements Tab -->
                <div id="achievementsTab" class="tab-content">
                    <div class="achievements-section">
                        <h2>🏆 الإنجازات والشارات</h2>
                        <div id="achievementsList" class="achievements-grid">
                            <!-- Achievements will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Enhanced Footer -->
    <div id="footer-placeholder"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p>⏳ جاري تحميل بياناتك...</p>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="../assets/js/components-loader.js"></script>
    <script src="../assets/js/profile.js"></script>

    <!-- Mobile Menu Script -->
    <script src="../assets/js/mobile-menu.js"></script>

    <!-- Motivational Messages -->
    <script src="../assets/dist/motivational-toast.js"></script>
</body>
</html>
